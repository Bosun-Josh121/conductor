# Conductor — Render deployment blueprint
# https://render.com/docs/blueprint-spec
#
# Deploy order: registry first, then agents, then orchestrator.
# After first deploy, fill in all URLs marked "← UPDATE" with the real
# .onrender.com addresses, then redeploy.

services:

  # ── 1. Agent Registry ───────────────────────────────────────────────────────
  - type: web
    name: conductor-registry
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:registry
    startCommand: node packages/registry/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production

  # ── 2. Orchestrator (serves the React dashboard SPA) ────────────────────────
  - type: web
    name: conductor-orchestrator
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:dashboard && npm run build:orchestrator
    startCommand: node packages/orchestrator/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_URL
        value: https://conductor-registry.onrender.com
      - key: HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: TRUSTLESS_WORK_API_URL
        value: https://dev.api.trustlesswork.com
      - key: TRUSTLESS_WORK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PLATFORM_SECRET_KEY
        sync: false
      - key: VERIFIER_SECRET_KEY
        sync: false
      - key: ARBITER_SECRET_KEY
        sync: false

  # ── 3. StellarOracle ────────────────────────────────────────────────────────
  - type: web
    name: conductor-stellar-oracle
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:oracle
    startCommand: node packages/agents/stellar-oracle/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_URL
        value: https://conductor-registry.onrender.com
      - key: STELLAR_ORACLE_SELF_URL
        value: https://conductor-stellar-oracle.onrender.com
      - key: STELLAR_ORACLE_SECRET_KEY
        sync: false
      - key: HORIZON_URL
        value: https://horizon-testnet.stellar.org

  # ── 4. WebIntel ─────────────────────────────────────────────────────────────
  - type: web
    name: conductor-web-intel
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:webintel
    startCommand: node packages/agents/web-intel/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_URL
        value: https://conductor-registry.onrender.com
      - key: WEB_INTEL_SELF_URL
        value: https://conductor-web-intel.onrender.com
      - key: WEB_INTEL_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── 5. WebIntel v2 ──────────────────────────────────────────────────────────
  - type: web
    name: conductor-web-intel-v2
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:webintel2
    startCommand: node packages/agents/web-intel-v2/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_URL
        value: https://conductor-registry.onrender.com
      - key: WEB_INTEL_V2_SELF_URL
        value: https://conductor-web-intel-v2.onrender.com
      - key: WEB_INTEL_V2_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── 6. Analysis agent ───────────────────────────────────────────────────────
  - type: web
    name: conductor-analysis
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:analysis
    startCommand: node packages/agents/analysis/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_URL
        value: https://conductor-registry.onrender.com
      - key: ANALYSIS_AGENT_SELF_URL
        value: https://conductor-analysis.onrender.com
      - key: ANALYSIS_AGENT_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── 7. Reporter agent ───────────────────────────────────────────────────────
  - type: web
    name: conductor-reporter
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:reporter
    startCommand: node packages/agents/reporter/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_URL
        value: https://conductor-registry.onrender.com
      - key: REPORT_AGENT_SELF_URL
        value: https://conductor-reporter.onrender.com
      - key: REPORT_AGENT_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
